<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-panel">
        <p class="eyebrow">JWT Login</p>
        <h1>Welcome Back</h1>
        <p class="intro">
          Sign in to continue to the task dashboard. New users can create an
          account from the same screen.
        </p>

        <div class="auth-tabs">
          <button id="show-login" class="secondary" type="button">Login</button>
          <button id="show-register" class="ghost" type="button">Register</button>
        </div>

        <form id="login-form" class="auth-form">
          <label>
            <span>Email</span>
            <input id="login-email" type="email" placeholder="Enter email" required />
          </label>
          <label>
            <span>Password</span>
            <input id="login-password" type="password" placeholder="Enter password" required />
          </label>
          <button type="submit">Login</button>
        </form>

        <form id="register-form" class="auth-form hidden">
          <label>
            <span>Name</span>
            <input id="register-name" type="text" placeholder="Enter name" required />
          </label>
          <label>
            <span>Email</span>
            <input id="register-email" type="email" placeholder="Enter email" required />
          </label>
          <label>
            <span>Password</span>
            <input
              id="register-password"
              type="password"
              placeholder="Minimum 6 characters"
              required
            />
          </label>
          <button type="submit">Create Account</button>
        </form>

        <p id="auth-status" class="status">Please login to continue.</p>
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
  </html>
